<!DOCTYPE html>
<html>
<head>
    <title>еҸӮж•°жҸҗеҸ–жөӢиҜ•</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>еҮҪж•°еҸӮж•°жҸҗеҸ–жөӢиҜ•</h1>
    
    <div class="test-section">
        <h3>жөӢиҜ•1: з®ҖеҚ•еҸӮж•°жҸҗеҸ–</h3>
        <div id="test1-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>жөӢиҜ•2: еӨҡдёӘеҸӮж•°жҸҗеҸ–</h3>
        <div id="test2-result" class="result"></div>
    </div>

    <script>
        // еӨҚеҲ¶еҸӮж•°жҸҗеҸ–еҮҪж•°
        function extractFunctionParams(codeContent) {
            console.log('[еҸӮж•°жҸҗеҸ–] ===== ејҖе§ӢжҸҗеҸ–еҮҪж•°еҸӮж•° =====');
            console.log('[еҸӮж•°жҸҗеҸ–] д»Јз Ғеқ—еҶ…е®№:', codeContent);
            
            var functionParams = null;
            
            // жҹҘжүҫеҮҪж•°е®ҡд№үиЎҢе’ҢеҸӮж•°еҸҳйҮҸ
            var funcDefMatch = codeContent.match(/def\s+\w+\([^)]*\):/);
            if (funcDefMatch) {
                console.log('[еҸӮж•°жҸҗеҸ–] жүҫеҲ°еҮҪж•°е®ҡд№ү:', funcDefMatch[0]);
                
                // жҸҗеҸ–еҮҪж•°еҗҚе’ҢеҸӮж•°еҗҚ
                var funcParamNames = [];
                var funcNameMatch = funcDefMatch[0].match(/def\s+(\w+)\(([^)]*)\):/);
                if (funcNameMatch) {
                    var paramNameStr = funcNameMatch[2].trim();
                    if (paramNameStr) {
                        funcParamNames = paramNameStr.split(',').map(p => p.trim()).filter(p => p);
                    }
                }
                console.log('[еҸӮж•°жҸҗеҸ–] еҮҪж•°еҸӮж•°еҗҚ:', funcParamNames);
                
                // йҰ–е…Ҳд»ҺеҮҪж•°е®ҡд№үиЎҢжҸҗеҸ–еҸӮж•°еҖј
                var funcDefLine = funcDefMatch[0];
                var paramLines = [];
                var paramIndex = 0;
                
                // жЈҖжҹҘеҮҪж•°е®ҡд№үиЎҢжҳҜеҗҰжңүеҸӮж•°еҖјжіЁйҮҠ
                if (funcDefLine.includes('# рҹ’Ў')) {
                    var commentMatch = funcDefLine.match(/# рҹ’Ў\s*(\w+)\s*=\s*([^#\s]+)/);
                    if (commentMatch) {
                        var paramName = commentMatch[1];
                        var paramValue = commentMatch[2].trim();
                        paramLines.push(`${paramName} = ${paramValue}`);
                        console.log('[еҸӮж•°жҸҗеҸ–] д»ҺеҮҪж•°е®ҡд№үиЎҢжҸҗеҸ–еҲ°еҸӮж•°:', paramName, '=', paramValue);
                        paramIndex++;
                    }
                }
                
                // еҰӮжһңеҸӮж•°ж•°йҮҸдёҚеӨҹпјҢз»§з»ӯд»ҺеҗҺз»ӯиЎҢжҹҘжүҫ
                if (paramLines.length < funcParamNames.length) {
                    var lines = codeContent.split('\n');
                    var foundFuncDef = false;
                    
                    for (var j = 0; j < lines.length; j++) {
                        var line = lines[j].trim();
                        if (foundFuncDef) {
                            // еҢ№й…Қ рҹ’Ў еҸҳйҮҸ ж јејҸ
                            if (line.includes('рҹ’Ў еҸҳйҮҸ')) {
                                var paramMatch = line.match(/рҹ’Ў\s*еҸҳйҮҸ\s+(\w+)\s*=\s*(.+)/);
                                if (paramMatch) {
                                    var paramName = paramMatch[1];
                                    var paramValue = paramMatch[2].trim();
                                    
                                    // еҰӮжһңжңүеҮҪж•°еҸӮж•°еҗҚдё”еҢ№й…ҚпјҢдҪҝз”ЁеҮҪж•°еҸӮж•°еҗҚ
                                    if (funcParamNames.length > 0 && paramIndex < funcParamNames.length) {
                                        paramName = funcParamNames[paramIndex];
                                        paramIndex++;
                                    }
                                    
                                    paramLines.push(`${paramName} = ${paramValue}`);
                                    console.log('[еҸӮж•°жҸҗеҸ–] жҸҗеҸ–еҲ°еҸӮж•°:', paramName, '=', paramValue);
                                }
                            } else if (line.includes('еҸҳйҮҸ')) {
                                var paramMatch = line.match(/еҸҳйҮҸ\s+(\w+)\s*=\s*(.+)/);
                                if (paramMatch) {
                                    var paramName = paramMatch[1];
                                    var paramValue = paramMatch[2].trim();
                                    paramLines.push(`${paramName} = ${paramValue}`);
                                }
                            } else if (line && !line.includes('в”Ӯ') && !line.includes('в”ң') && !line.includes('в””') && !line.includes('в¬…пёҸ') && !line.includes('рҹ’Ў')) {
                                // еҰӮжһңйҒҮеҲ°йқһз©әиЎҢдё”дёҚжҳҜеҸҳйҮҸиЎҢпјҢеҒңжӯўж”¶йӣҶ
                                break;
                            }
                        } else if (line.includes('def ')) {
                            foundFuncDef = true;
                        }
                    }
                }
                
                if (paramLines.length > 0) {
                    functionParams = paramLines.join(', ');
                    console.log('[еҸӮж•°жҸҗеҸ–] жүҫеҲ°еҮҪж•°еҸӮж•°:', functionParams);
                }
            }
            
            console.log('[еҸӮж•°жҸҗеҸ–] жңҖз»Ҳз»“жһң:', functionParams || 'ж— еҸӮж•°');
            return functionParams;
        }
        
        // жөӢиҜ•з”ЁдҫӢ
        function runTests() {
            console.log('=== ејҖе§ӢжөӢиҜ• ===');
            
            // жөӢиҜ•1: з®ҖеҚ•еҸӮж•°
            var test1Code = `def helper_function(x):  # рҹ’Ў x=3
    """иҫ…еҠ©еҮҪж•°пјҡи®Ўз®—е№іж–№"""
    result = x * x  # рҹ’Ў res
    return result`;
            
            var result1 = extractFunctionParams(test1Code);
            var resultDiv1 = document.getElementById('test1-result');
            if (result1 === 'x = 3') {
                resultDiv1.innerHTML = '<span class="success">вң“ жөӢиҜ•1йҖҡиҝҮ: ' + result1 + '</span>';
            } else {
                resultDiv1.innerHTML = '<span class="error">вң— жөӢиҜ•1еӨұиҙҘ: жңҹжңӣ "x = 3"пјҢе®һйҷ… "' + result1 + '"</span>';
            }
            
            // жөӢиҜ•2: еӨҡдёӘеҸӮж•°
            var test2Code = `def process_data(data, multiplier):  # рҹ’Ў data=[1,2,3], multiplier=2
    """еӨ„зҗҶж•°жҚ®"""
    result = [x * multiplier for x in data]
    return result`;
            
            var result2 = extractFunctionParams(test2Code);
            var resultDiv2 = document.getElementById('test2-result');
            if (result2 && result2.includes('data') && result2.includes('multiplier')) {
                resultDiv2.innerHTML = '<span class="success">вң“ жөӢиҜ•2йҖҡиҝҮ: ' + result2 + '</span>';
            } else {
                resultDiv2.innerHTML = '<span class="error">вң— жөӢиҜ•2еӨұиҙҘ: жңӘжӯЈзЎ®жҸҗеҸ–еӨҡдёӘеҸӮж•°пјҢе®һйҷ… "' + result2 + '"</span>';
            }
        }
        
        // йЎөйқўеҠ иҪҪеҗҺиҝҗиЎҢжөӢиҜ•
        window.onload = runTests;
    </script>
</body>
</html>
